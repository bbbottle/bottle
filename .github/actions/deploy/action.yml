name: Deploy dist to server
description: deploy dist to server
inputs:
  source:
    description: local source path
    required: true
  target:
    description: remote target path
    required: true
  package:
    description: package title
    required: true
  msg:
    description: messages send to channel
    required: false

runs:
  using: "composite"
  steps:
    - name: Build Packages
      run: pnpm turbo run build --filter ${{ inputs.package }}
      shell: bash
    - name: send files to server
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ env.SERVER_SSH_KEY }}
        SOURCE: ${{ inputs.source }}
        REMOTE_HOST: ${{ env.REMOTE_HOST }}
        REMOTE_USER: ${{ env.REMOTE_USER }}
        TARGET: ${{ inputs.target }}
        EXCLUDE: "/dist/, /node_modules/"
    - name: Add deployment to stream
      run: |
        pnpm --filter @bbki.ng/cli build
        node packages/cli/dist/cli.js stream add \
          --content "$(echo '${{ github.sha }}' | cut -c1-7)" \
          --type ci \
          --author "GitHub" \
          --api-key "$STREAM_API_KEY"
      shell: bash
      env:
        STREAM_API_KEY: ${{ env.STREAM_API_KEY }}
